<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Wallet</title>

<style>
body{background:#0b0b0b;color:#00ff88;font-family:monospace;margin:0;text-align:center}
button{padding:12px;border:none;border-radius:10px;background:#111;color:#00ff88;font-size:18px}

.carousel{display:flex;overflow-x:auto;gap:20px;padding:20px;scroll-snap-type:x mandatory}
.card{min-width:100%;background:#111;border-radius:12px;padding:15px;scroll-snap-align:center}
.card img{width:100%;border-radius:10px}

#addBtn{position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-radius:50%;font-size:28px;background:#00ff88;color:#000}

input,select{width:90%;padding:12px;margin:6px;background:#fff;color:#000;border:none;border-radius:8px}

#lockScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
}
</style>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0b0b">
</head>

<body>

<!-- PASSWORD LOCK SCREEN -->
<div id="lockScreen">
<h2>Enter Password</h2>
<input type="password" id="unlockPass" placeholder="Password">
<button onclick="unlockApp()">Unlock</button>
</div>

<!-- MAIN -->
<div id="main">

<h2>QR Wallet</h2>

<input id="titleSearch" placeholder="Search QR by title...">

<div class="carousel" id="qrList"></div>

<br>

<!-- PASSWORD SETTINGS -->
<button onclick="addPassword()">Add Password Lock</button>
<button onclick="removePassword()">Remove Password Lock</button>

</div>

<button id="addBtn" onclick="openPopup()">+</button>


<!-- POPUP -->
<div id="popup" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#000;padding:20px;overflow-y:auto">

<h3>Add QR</h3>

<input id="qrTitle" placeholder="Title">

<select id="qrMode" onchange="modeChange()">
<option value="upload">Upload QR Image</option>
<option value="generate">Generate QR</option>
</select>

<div id="uploadBox">
<input type="file" accept="image/*" onchange="loadImage(event)">
<input id="qrText" placeholder="Detected text">
</div>

<div id="generatorBox" style="display:none">

<select id="qrType" onchange="buildFields()">
<option value="text">Plain Text</option>
<option value="link">Website Link</option>
<option value="wifi">WiFi</option>
<option value="vcard">Contact vCard</option>
</select>

<div id="fields"></div>

<button onclick="addRow()">+ Add Row</button>
<button onclick="generateQR()">Generate</button>

<div id="preview"></div>

</div>

<button onclick="saveQR()">SAVE</button>
<button onclick="closePopup()">CANCEL</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

/* PASSWORD SYSTEM */

function addPassword(){

let existing=localStorage.getItem("qrPassword")

if(existing){
alert("Password already exists")
return
}

let pass=prompt("Create new password")

if(!pass||pass.length<4){
alert("Password must be at least 4 characters")
return
}

localStorage.setItem("qrPassword",pass)

alert("Password lock enabled")

}

function removePassword(){

let saved=localStorage.getItem("qrPassword")

if(!saved){
alert("No password set")
return
}

let pass=prompt("Enter current password")

if(pass===saved){

localStorage.removeItem("qrPassword")

alert("Password removed")

}else{

alert("Wrong password")

}

}

/* LOCK CHECK */

window.onload=function(){

let saved=localStorage.getItem("qrPassword")

if(saved){

lockScreen.style.display="flex"

}

}

/* UNLOCK */

function unlockApp(){

let saved=localStorage.getItem("qrPassword")

if(unlockPass.value===saved){

lockScreen.style.display="none"

}else{

alert("Wrong password")

}

unlockPass.value=""

}


/* INDEXED DB */

let db;
let request=indexedDB.open("qrVault",1);

request.onupgradeneeded=e=>{
db=e.target.result;
db.createObjectStore("qrStore",{keyPath:"id",autoIncrement:true});
};

request.onsuccess=e=>{
db=e.target.result;
loadQR();
};


/* MODE SWITCH */

function modeChange(){

if(qrMode.value==="upload"){
uploadBox.style.display="block";
generatorBox.style.display="none";
}else{
uploadBox.style.display="none";
generatorBox.style.display="block";
buildFields();
}

}


/* QR GENERATOR */

let generatedData=""
let generatedImage=""

function buildFields(){

fields.innerHTML=""

if(qrType.value==="text") addRow("Text")

if(qrType.value==="link"){
addRow("URL")
addRow("Title")
}

if(qrType.value==="wifi"){
addRow("SSID")
addRow("Password")
}

if(qrType.value==="vcard"){
addRow("Full Name")
addRow("Phone")
addRow("Email")
addRow("Organization")
}

}

function addRow(label="Extra"){
let div=document.createElement("div")
div.innerHTML=`<input placeholder="${label}">`
fields.appendChild(div)
}

function generateQR(){

let vals=[...fields.querySelectorAll("input")].map(i=>i.value)
let type=qrType.value

if(type==="text") generatedData=vals.join("\n")

if(type==="link") generatedData=vals[0]

if(type==="wifi") generatedData=`WIFI:T:WPA;S:${vals[0]};P:${vals[1]};;`

if(type==="vcard")

generatedData=`BEGIN:VCARD
VERSION:3.0
FN:${vals[0]}
TEL:${vals[1]}
EMAIL:${vals[2]}
ORG:${vals[3]}
END:VCARD`

QRCode.toDataURL(generatedData,{width:600},(err,url)=>{

generatedImage=url
preview.innerHTML=`<img src="${url}" style="width:100%">`

})

}


/* UPLOAD */

let tempImg=""

function loadImage(e){

let file=e.target.files[0]
let reader=new FileReader()

reader.onload=function(evt){

let img=new Image()
img.src=evt.target.result

img.onload=function(){

let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")

canvas.width=600
canvas.height=img.height*(600/img.width)

ctx.drawImage(img,0,0,canvas.width,canvas.height)

tempImg=canvas.toDataURL("image/jpeg",0.7)

let data=ctx.getImageData(0,0,canvas.width,canvas.height)
let code=jsQR(data.data,canvas.width,canvas.height)

if(code) qrText.value=code.data

}

}

reader.readAsDataURL(file)

}


/* SAVE */

function saveQR(){

let title=qrTitle.value

if(!title){
alert("Title required")
return
}

let image=""
let text=""

if(qrMode.value==="upload"){
image=tempImg
text=qrText.value
}else{
image=generatedImage
text=generatedData
}

if(!image){
alert("Generate or upload first")
return
}

let tx=db.transaction("qrStore","readwrite")

tx.objectStore("qrStore").add({title,image,text})

closePopup()
loadQR()

}


/* LOAD */

function loadQR(){

let tx=db.transaction("qrStore","readonly")
let req=tx.objectStore("qrStore").getAll()

req.onsuccess=function(){

qrList.innerHTML=""

req.result.forEach(item=>{

qrList.innerHTML+=`
<div class="card">
<h4>${item.title}</h4>
<img src="${item.image}" ondblclick="copyQR('${item.text}')">
<button onclick="deleteQR(${item.id})">Delete</button>
</div>`

})

}

}


/* COPY */

function copyQR(text){

navigator.clipboard.writeText(text)
alert("Copied")

}


/* DELETE */

function deleteQR(id){

if(!confirm("Delete?")) return

let tx=db.transaction("qrStore","readwrite")

tx.objectStore("qrStore").delete(id)

tx.oncomplete=loadQR

}


/* POPUP */

function openPopup(){popup.style.display="block";modeChange();}
function closePopup(){popup.style.display="none";}


/* SEARCH */

titleSearch.addEventListener("input",function(){

const q=this.value.toLowerCase()

document.querySelectorAll(".card").forEach(card=>{

const title=card.querySelector("h4").innerText.toLowerCase()

card.style.display=title.includes(q)?"block":"none"

})

})


/* PWA */

if("serviceWorker" in navigator){

navigator.serviceWorker.register("./service-worker.js")

}

</script>

</body>
</html>
